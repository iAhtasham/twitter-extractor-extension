<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Analytics Panel</title>
    <!-- Load data from chrome.storage.local before main script -->
    <script>
      (function() {
        if (typeof chrome !== 'undefined' && chrome.storage && chrome.storage.local) {
          chrome.storage.local.get(['postData'], function(result) {
            if (result.postData) {
              localStorage.postData = result.postData;
              console.log('[Analytics] Loaded', JSON.parse(result.postData).length, 'tweets from storage');
            }
          });
        }
      })();
    </script>
    <script type="module" crossorigin src="/src/pages/analytic/index.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/js/modulepreload-polyfill.0c213636.js">
    <link rel="modulepreload" crossorigin href="/assets/js/jsx-runtime.099d0a10.js">
    <link rel="modulepreload" crossorigin href="/assets/js/tailwind.db43586d.js">
    <link rel="stylesheet" href="/assets/css/Tailwind.chunk.css">
    <link rel="stylesheet" href="/assets/css/analyticIndex.chunk.css">
  </head>

  <body>
    <div id="app-container"></div>
    
  </body>
</html>
