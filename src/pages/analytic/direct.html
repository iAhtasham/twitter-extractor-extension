<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Scraped Tweets</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #15202b;
            color: white;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        h1 {
            font-size: 24px;
            color: #fff;
        }
        .stats {
            display: flex;
            gap: 24px;
            color: #8899a6;
            font-size: 14px;
        }
        .stat-value {
            color: #1da1f2;
            font-weight: bold;
        }
        .actions {
            display: flex;
            gap: 12px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-primary {
            background-color: #1da1f2;
            color: white;
        }
        .btn-danger {
            background-color: #e0245e;
            color: white;
        }
        .btn-success {
            background-color: #17bf63;
            color: white;
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: #8899a6;
        }
        .empty {
            text-align: center;
            padding: 60px;
            color: #8899a6;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #38444d;
        }
        th {
            background-color: #192734;
            color: #8899a6;
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        tr:hover {
            background-color: #192734;
        }
        .tweet-content {
            max-width: 400px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tweet-content:hover {
            white-space: normal;
        }
        .username {
            color: #1da1f2;
        }
        .time {
            color: #8899a6;
            font-size: 12px;
        }
        .type-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
        .type-text { background-color: #38444d; }
        .type-image { background-color: #17bf63; }
        .type-video { background-color: #794bc4; }
        .reply-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            background-color: #1da1f2;
            color: white;
        }
        .reply-row {
            background-color: rgba(29, 161, 242, 0.1);
        }
        .tweet-link {
            text-decoration: none;
            font-size: 16px;
        }
        .parent-link {
            color: #1da1f2;
            text-decoration: none;
            font-size: 12px;
        }
        .parent-link:hover {
            text-decoration: underline;
        }
        .number {
            color: #fff;
            font-weight: 500;
        }
        .search-box {
            padding: 10px 16px;
            border: 1px solid #38444d;
            border-radius: 8px;
            background-color: #192734;
            color: white;
            font-size: 14px;
            width: 250px;
        }
        .search-box:focus {
            outline: none;
            border-color: #1da1f2;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐦 Scraped Tweets</h1>
            <div class="stats" id="stats"></div>
            <div class="actions">
                <input type="text" class="search-box" id="search" placeholder="Filter tweets...">
                <button class="btn btn-success" id="download-btn">📥 Download CSV</button>
                <button class="btn btn-danger" id="clear-btn">🗑️ Clear Data</button>
            </div>
        </header>
        
        <div id="content">
            <div class="loading">Loading tweets...</div>
        </div>
    </div>

    <script src="direct.js"></script>
</body>
</html>
