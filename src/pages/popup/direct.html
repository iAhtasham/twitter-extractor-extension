<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Direct Tweet Scraper</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 320px;
            min-height: 220px;
            background-color: #15202b;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 16px;
        }
        h1 { font-size: 16px; margin-bottom: 12px; text-align: center; }
        .status {
            background-color: #192734;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 12px;
            text-align: center;
            word-break: break-all;
        }
        .success { color: #5ABD4E; }
        .error { color: #e0245e; }
        .info { color: #1da1f2; }
        .warning { color: #ffad1f; }
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 13px;
            color: #8899a6;
        }
        input[type="number"] {
            width: 50px;
            padding: 6px 8px;
            border: 1px solid #38444d;
            border-radius: 4px;
            background-color: #192734;
            color: white;
            font-size: 13px;
            text-align: center;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background-color: #1da1f2; color: white; }
        .debug { font-size: 10px; color: #657786; margin-top: 8px; word-break: break-all; }
        .stats-box {
            background-color: #192734;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 4px 0;
            color: #8899a6;
        }
        .stat-row span:last-child {
            color: #1da1f2;
            font-weight: bold;
        }
        .checkbox-row {
            justify-content: flex-start;
        }
        .checkbox-row label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #e1e8ed;
        }
        .checkbox-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #1da1f2;
        }
        input[type="number"] {
            width: 60px;
        }
    </style>
</head>
<body>
    <h1>🐦 Direct Tweet Scraper</h1>
    <div style="text-align: center; margin-bottom: 12px;">
        <a href="bulk.html" style="color: #1da1f2; font-size: 12px; text-decoration: none;">🔍 Bulk Keyword Scraper (Multiple Keywords)</a>
    </div>
    <div id="status" class="status info">Loading...</div>
    
    <!-- Stats section (hidden by default) -->
    <div id="stats-section" style="display: none;">
        <div class="stats-box">
            <div class="stat-row">
                <span>Phase:</span>
                <span id="stat-phase">-</span>
            </div>
            <div class="stat-row">
                <span>Tweets scraped:</span>
                <span id="stat-tweets">0</span>
            </div>
            <div class="stat-row">
                <span>Replies scraped:</span>
                <span id="stat-replies">0</span>
            </div>
            <div class="stat-row">
                <span>Reply posts:</span>
                <span id="stat-reply-progress">-</span>
            </div>
        </div>
    </div>
    
    <div id="settings-section">
        <div class="setting-row">
            <span>Scroll delay (sec):</span>
            <input type="number" id="wait-time" value="2" min="1" max="10">
        </div>        <div class="setting-row">
            <span>Max tweets (0 = no limit):</span>
            <input type="number" id="max-tweets" value="0" min="0" max="10000">
        </div>
        <div class="setting-row checkbox-row">
            <label>
                <input type="checkbox" id="scrape-replies" checked>
                <span>Scrape replies from posts</span>
            </label>
        </div>
        <div class="setting-row checkbox-row">
            <label>
                <input type="checkbox" id="include-media" checked>
                <span>Include media URLs</span>
            </label>
        </div>
        <div class="setting-row checkbox-row">
            <label>
                <input type="checkbox" id="include-metrics" checked>
                <span>Include engagement metrics</span>
            </label>
        </div>        <button id="scrape-btn" class="btn btn-primary">🚀 Start Scraping</button>
    </div>
    <div id="debug" class="debug"></div>

    <script src="popup.js"></script>
</body>
</html>
